[workspace]
authors = ["Mark Kittisopikul <kittisopikulm@janelia.hhmi.org>"]
channels = ["conda-forge"]
name = "zstd_recompress"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
zstd = ">=1.5.7,<2"
xxhash = ">=0.8.3,<0.9"
parallel = ">=20260422,<20260423"

[environments]
hermetic = ["default", "hermetic"]

[feature.hermetic.dependencies]
util-linux = "*"
findutils = "*"
gawk = "*"
coreutils = "*"
